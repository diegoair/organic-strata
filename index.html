<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg:       #0a0a08;
      --surface:  #111110;
      --ink:      #f0ede6;
      --ink-dim:  #6b6860;
      --accent:   #c8f060;   /* acid green — organic vitality */
      --accent2:  #f06030;   /* warm ember */
      --line:     rgba(240,237,230,0.08);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── organic noise canvas behind everything ── */
    #canvas-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.18;
    }

    /* ── layout ── */
    .shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
    }

    /* ── wordmark ── */
    .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15em;
    }

    .wordmark__title {
      font-size: clamp(1.5rem, 9vw, 13rem);
      font-weight: 800;
      line-height: 0.88;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      text-align: center;
      background: linear-gradient(
        135deg,
        var(--ink) 0%,
        var(--accent) 45%,
        var(--ink) 80%
      );
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation:
        fadeUp 0.9s ease forwards 0.05s,
        shimmer 6s ease-in-out infinite 1.5s;
      opacity: 0;
    }

    .wordmark__sub {
      font-family: 'Syne Mono', monospace;
      font-size: clamp(0.55rem, 0.9vw, 0.7rem);
      letter-spacing: 0.22em;
      color: var(--ink-dim);
      text-transform: uppercase;
      margin-top: 0.6em;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    /* ── nav links ── */
    .nav {
      display: flex;
      gap: clamp(2rem, 6vw, 5rem);
      margin-top: clamp(2.5rem, 5vh, 4.5rem);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.65s;
    }

    .nav__link {
      position: relative;
      text-decoration: none;
      font-size: clamp(0.9rem, 1.6vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-dim);
      transition: color 0.25s ease;
      padding-bottom: 0.35em;
    }

    /* animated underline */
    .nav__link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1.5px;
      background: var(--accent);
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav__link:hover {
      color: var(--ink);
    }

    .nav__link:hover::after {
      width: 100%;
    }

    /* genesis gets a subtle accent tint on hover */
    .nav__link--genesis:hover {
      color: var(--accent);
    }
    .nav__link--genesis::after {
      background: var(--accent);
    }

    /* strata gets ember */
    .nav__link--strata:hover {
      color: var(--accent2);
    }
    .nav__link--strata::after {
      background: var(--accent2);
    }

    /* spore gets a cool blue-grey */
    .nav__link--spore:hover {
      color: #a0c8f0;
    }
    .nav__link--spore::after {
      background: #a0c8f0;
    }

    /* pollen gets a warm pollen-yellow */
    .nav__link--pollen:hover {
      color: #e8c84a;
    }
    .nav__link--pollen::after {
      background: #e8c84a;
    }

    /* living path gets a vital violet */
    .nav__link--living:hover {
      color: #b48cf0;
    }
    .nav__link--living::after {
      background: #b48cf0;
    }

    /* ── corner metadata ── */
    .meta {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      transform: none;
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--ink-dim);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1s;
    }

    /* ── keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
  </style>
</head>
<body>

  <canvas id="canvas-bg"></canvas>

  <main class="shell">
    <div class="wordmark">
      <h1 class="wordmark__title">Organica</h1>
      <span class="wordmark__sub">Tools for Organic Visual Language</span>
    </div>

    <nav class="nav">
      <a class="nav__link nav__link--genesis" href="/genesis/">Genesis</a>
      <a class="nav__link nav__link--strata" href="/strata/">Strata</a>
      <a class="nav__link nav__link--spore" href="/spore/">Spore</a>
      <a class="nav__link nav__link--pollen" href="/pollen/">Pollen</a>
      <a class="nav__link nav__link--living" href="/livingpath/">Living Path</a>
    </nav>
  </main>

  <p class="meta">Organica — System v0.1</p>

  <script>
    // ── organic noise field on canvas ──
    const canvas = document.getElementById('canvas-bg');
    const ctx    = canvas.getContext('2d');

    let W, H, t = 0;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    // simple smooth-noise helper (value noise)
    function hash(x, y) {
      const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
      return n - Math.floor(n);
    }

    function noise(x, y) {
      const ix = Math.floor(x), iy = Math.floor(y);
      const fx = x - ix, fy = y - iy;
      const ux = fx * fx * (3 - 2 * fx);
      const uy = fy * fy * (3 - 2 * fy);
      return (
        hash(ix,   iy)   * (1-ux) * (1-uy) +
        hash(ix+1, iy)   * ux     * (1-uy) +
        hash(ix,   iy+1) * (1-ux) * uy     +
        hash(ix+1, iy+1) * ux     * uy
      );
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      const step   = 36;         // grid spacing
      const scale  = 0.0035;     // noise zoom
      const speed  = 0.0004;     // animation pace

      ctx.lineWidth = 0.8;

      for (let x = 0; x <= W; x += step) {
        for (let y = 0; y <= H; y += step) {
          const n   = noise(x * scale + t, y * scale + t * 0.6);
          const ang = n * Math.PI * 4;
          const len = 14 + n * 12;

          const x2 = x + Math.cos(ang) * len;
          const y2 = y + Math.sin(ang) * len;

          // gradient: acid green → ember, based on position
          const mix = x / W;
          const r   = Math.round(200 + mix * 56);   // 200→255 range
          const g   = Math.round(240 - mix * 160);   // 240→80
          const b   = Math.round(96  - mix * 48);    // 96→48

          ctx.strokeStyle = `rgba(${r},${g},${b},0.55)`;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
      }

      t += speed;
      requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
  </script>
</body>
</html>
