<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Mono', 'Courier New', monospace;
    background: #1a1a1a;
    color: #e0e0e0;
    padding: 20px;
    font-size: 12px;
  }
  h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
    color: #fff;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 11px;
    color: #888;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.ok  { background: #4caf50; }
  .dot.err { background: #f44336; }
  .btn {
    display: block;
    width: 100%;
    padding: 10px 14px;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
    margin-bottom: 8px;
  }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary   { background: #e0e0e0; color: #1a1a1a; }
  .btn-primary:not(:disabled):hover { background: #fff; }
  .btn-secondary { background: #2e2e2e; color: #aaa; }
  .btn-secondary:not(:disabled):hover { background: #383838; color: #e0e0e0; }
  #status-text {
    margin-top: 14px;
    font-size: 11px;
    color: #666;
    min-height: 36px;
    line-height: 1.6;
    word-break: break-all;
  }
  #status-text.ok  { color: #4caf50; }
  #status-text.err { color: #f44336; }
</style>
</head>
<body>
<h1>Organic Strata</h1>

<div class="status-row">
  <div class="dot" id="dot"></div>
  <span id="server-status">Checking backend…</span>
</div>

<button class="btn btn-primary" id="btn-import" disabled>→ Import Latest Shape</button>
<button class="btn btn-secondary" id="btn-refresh">⟳ Refresh</button>
<button class="btn btn-secondary" id="btn-reload">↺ Reload Plugin</button>

<div id="status-text"></div>

<script>
const BACKEND = 'http://localhost:5050';

async function checkHealth() {
  const dot = document.getElementById('dot');
  const srv = document.getElementById('server-status');
  const btn = document.getElementById('btn-import');
  try {
    const h = await fetch(BACKEND + '/health').then(r => r.json());
    dot.className = 'dot ok';
    srv.textContent = h.figma_token_set ? 'Backend ready' : 'Backend up — token missing';
    btn.disabled = false;
  } catch (e) {
    dot.className = 'dot err';
    srv.textContent = 'Backend offline';
    btn.disabled = true;
  }
}

document.getElementById('btn-refresh').addEventListener('click', () => {
  document.getElementById('server-status').textContent = 'Checking…';
  document.getElementById('dot').className = 'dot';
  checkHealth();
});

document.getElementById('btn-import').addEventListener('click', async () => {
  const txt = document.getElementById('status-text');
  txt.className = '';
  txt.textContent = 'Checking regions…';

  // 1. Ask backend how many regions exist
  let regionData;
  try {
    regionData = await fetch(BACKEND + '/regions').then(r => r.json());
  } catch (e) {
    txt.className = 'err';
    txt.textContent = 'Cannot reach backend: ' + e.message;
    return;
  }

  const regions = regionData.regions || [];

  // 2a. Multiple regions — fetch each SVG and import separately
  if (regions.length > 1) {
    txt.textContent = `Fetching ${regions.length} regions…`;
    const items = [];
    for (const region of regions) {
      try {
        const resp = await fetch(region.url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const svg = await resp.text();
        items.push({ label: region.label, svg });
      } catch (e) {
        txt.className = 'err';
        txt.textContent = 'Error fetching ' + region.label + ': ' + e.message;
        return;
      }
    }
    txt.textContent = 'Importing into Figma…';
    parent.postMessage({ pluginMessage: { type: 'import-regions', items } }, '*');
    return;
  }

  // 2b. Single region or none — use /latest-svg
  txt.textContent = 'Fetching SVG…';
  let svg;
  try {
    const resp = await fetch('http://localhost:5050/latest-svg?t=' + Date.now(), {
      cache: 'no-store',
      headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' }
    });
    if (!resp.ok) {
      const j = await resp.json().catch(() => ({}));
      throw new Error(j.error || 'HTTP ' + resp.status);
    }
    svg = await resp.text();
    const kb = Math.round(svg.length / 1024);
    txt.textContent = 'SVG loaded: ' + kb + 'kb @ ' + new Date().toLocaleTimeString();
  } catch (e) {
    txt.className = 'err';
    txt.textContent = 'Fetch failed: ' + e.message;
    return;
  }
  txt.textContent = 'Importing into Figma…';
  parent.postMessage({ pluginMessage: { type: 'import-svg', svg } }, '*');
});

window.onmessage = (ev) => {
  const msg = ev.data.pluginMessage;
  if (!msg) return;
  const txt = document.getElementById('status-text');
  if (msg.type === 'done') {
    txt.className = 'ok';
    txt.textContent = 'Imported — node ' + msg.nodeId;
  } else if (msg.type === 'done-regions') {
    txt.className = 'ok';
    txt.textContent = `Imported ${msg.count} region${msg.count !== 1 ? 's' : ''} side by side`;
  } else if (msg.type === 'error') {
    txt.className = 'err';
    txt.textContent = 'Error: ' + msg.message;
  }
};

document.getElementById('btn-reload').addEventListener('click', () => {
  parent.postMessage({ pluginMessage: { type: 'reload' } }, '*');
});

checkHealth();
</script>
</body>
</html>
