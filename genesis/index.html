<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis — Organica</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111;
    --surface: #1a1a1a;
    --line: rgba(255,255,255,0.08);
    --ink: #e8e4de;
    --muted: #555;
    --accent: #888;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 1px solid var(--line);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .logo span { color: var(--muted); }
  .header-tag {
    font-family: var(--mono);
    font-size: 10px;
    background: rgba(255,255,255,0.05);
    padding: 3px 8px;
    border-radius: 3px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  nav {
    margin-left: auto;
    display: flex;
    gap: 2px;
  }
  nav a {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid transparent;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: all 0.15s;
  }
  nav a:hover { color: var(--ink); border-color: var(--line); background: var(--surface); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 24px;
    text-align: center;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--ink);
    line-height: 1.15;
  }
  h1 em {
    font-style: normal;
    color: var(--muted);
  }

  .description {
    font-size: 14px;
    color: var(--accent);
    line-height: 1.7;
    max-width: 400px;
    font-family: var(--mono);
    letter-spacing: 0.01em;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 5px 12px;
    border-radius: 20px;
  }
  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
  }

  footer {
    border-top: 1px solid var(--line);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
    gap: 16px;
  }
  footer a {
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
    padding-bottom: 1px;
    transition: color 0.15s;
  }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">Organic<span>a</span></div>
  <div class="header-tag">genesis</div>
  <nav>
    <a href="/">Hub</a>
    <a href="https://organic-strata.vercel.app">Strata</a>
  </nav>
</header>

<main>
  <div class="eyebrow">Organica — Genesis</div>
  <h1>Shape <em>origin</em><br>system</h1>
  <p class="description">A generative library of organic forms. Motion primitives, morphological rules, and visual grammar for natural interfaces.</p>
  <div class="status-pill">
    <span class="status-dot"></span>
    In development
  </div>
</main>

<footer>
  <a href="/">Organica</a>
  <span>·</span>
  <a href="https://organic-strata.vercel.app">Strata</a>
  <span>·</span>
  <span>Genesis placeholder</span>
</footer>

</body>
</html>
