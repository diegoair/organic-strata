<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis Library — Organica</title>
  <link rel="stylesheet" href="organic-library.css">
  <style>
    /* ─── Base — Pollen palette (light / mono) ───────────────── */
    :root {
      --bg: #f5f2ec;             /* paper — main background */
      --surface: #eceae4;        /* panel — sidebar / tile background */
      --surface-raised: #e3dfd6; /* tile hover / selected background */
      --border: #d0c8b8;         /* subtle dividers */
      --border-strong: #a89e88;  /* active / focus borders */
      --ink: #0a0a0a;            /* main text + SVG fill */
      --ink-muted: #726a5e;      /* secondary text, labels */
      --ink-faint: #a89e8c;      /* very subtle text */
      --accent: #0a0a0a;         /* selection / active — ink (Pollen) */
      --accent-blue: #0a0a0a;    /* input focus ring */
      --pollen: #c8a83a;         /* warm pollen yellow (sparingly) */

      --panel-width-left: 200px;
      --panel-width-right: 260px;
      --toolbar-height: 48px;
      --tile-min-size: 100px;

      --radius-sm: 0px;
      --radius-md: 0px;
      --font: 'DM Mono', 'Courier New', monospace;
      --font-size-xs: 10px;
      --font-size-sm: 11px;
      --font-size-md: 12px;
    }

    /* ─── App shell ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font); font-size: var(--font-size-md); }

    .app {
      display: grid;
      grid-template-columns: var(--panel-width-left) 1fr var(--panel-width-right);
      grid-template-rows: 100vh;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Left: Sets panel ──────────────────────────────────── */
    .sets-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sets-panel__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .sets-panel__title {
      font-size: var(--font-size-xs); font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-muted);
    }
    .sets-list { list-style: none; overflow-y: auto; flex: 1; padding: 8px 0; }
    .set-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; cursor: pointer; transition: background 0.1s; font-size: var(--font-size-sm);
    }
    .set-item:hover { background: var(--surface-raised); }
    .set-item.active {
      background: var(--surface-raised); border-left: 2px solid var(--accent); padding-left: 14px;
    }
    .set-item__name { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .set-item__count {
      font-size: var(--font-size-xs); color: var(--ink-muted); background: var(--border);
      padding: 1px 6px; border-radius: 10px; flex-shrink: 0; margin-left: 8px;
    }
    .set-item__builtin { font-size: 9px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ─── Main: Canvas area ─────────────────────────────────── */
    .canvas-area { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .toolbar {
      height: var(--toolbar-height); display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .toolbar__left { display: flex; align-items: baseline; gap: 10px; }
    .toolbar__set-name { font-size: var(--font-size-md); font-weight: 500; color: var(--ink); }
    .toolbar__count { font-size: var(--font-size-xs); color: var(--ink-muted); }
    .toolbar__right { display: flex; gap: 8px; }

    /* ─── Form Grid ─────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols, 4), 1fr);
      column-gap: var(--col-gap, 16px);
      row-gap: var(--row-gap, 16px);
      padding: var(--grid-padding, 24px);
      overflow-y: auto; align-content: start; flex: 1;
      grid-auto-rows: minmax(var(--tile-min-size), auto);
    }

    /* ─── Form Tile ─────────────────────────────────────────── */
    .form-tile {
      grid-column: span var(--col-span, 1);
      grid-row: span var(--row-span, 1);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex; flex-direction: column;
      min-height: var(--tile-min-size); overflow: hidden; user-select: none;
    }
    .form-tile:hover { border-color: var(--border-strong); background: var(--surface-raised); }
    .form-tile.selected { border-color: var(--accent); background: var(--surface-raised); }
    .form-tile__preview { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; min-height: 0; }
    .form-tile__svg { width: 100%; height: 100%; max-width: 120px; max-height: 120px; display: flex; align-items: center; justify-content: center; color: var(--ink); }
    .form-tile__svg svg { width: 100%; height: 100%; }
    /* Static: suppress animations from organic-library.css in this view */
    .form-tile__svg * { animation: none !important; }
    .form-tile__meta {
      padding: 6px 10px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
    }
    .form-tile__name { font-size: var(--font-size-xs); color: var(--ink-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .form-tile__type { font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
    .form-tile__num { position: absolute; }

    .grid-empty { color: var(--ink-muted); font-size: var(--font-size-sm); padding: 40px; grid-column: 1 / -1; text-align: center; }

    /* ─── Right: Design Panel (Figma-style) ─────────────────── */
    .design-panel { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .panel-section { padding: 12px 16px; }
    .panel-section__header { margin-bottom: 10px; }
    .panel-section__title { font-size: var(--font-size-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); }
    .panel-row { display: flex; align-items: center; justify-content: space-between; min-height: 28px; margin-bottom: 4px; gap: 8px; }
    .panel-row--center { justify-content: center; }
    .panel-label { font-size: var(--font-size-sm); color: var(--ink-muted); flex-shrink: 0; width: 80px; }
    .panel-input-group { display: flex; align-items: center; gap: 4px; flex: 1; justify-content: flex-end; }
    .panel-input {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--ink); font-size: var(--font-size-sm); font-family: var(--font);
      padding: 4px 8px; width: 64px; text-align: right; outline: none; -moz-appearance: textfield;
    }
    .panel-input::-webkit-inner-spin-button, .panel-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .panel-input:focus { border-color: var(--accent-blue); }
    .panel-input--full { width: 100%; text-align: left; }
    .panel-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .panel-unit { font-size: var(--font-size-xs); color: var(--ink-muted); width: 16px; }
    .panel-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ─── Type pills ─────────────────────────────────────────── */
    .panel-type-pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .type-pill {
      font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--ink-muted); cursor: pointer; font-family: var(--font); transition: all 0.1s;
    }
    .type-pill:hover { border-color: var(--border-strong); color: var(--ink); }
    .type-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* ─── Alignment grid (3×3) ───────────────────────────────── */
    .align-grid { display: grid; grid-template-columns: repeat(3, 22px); grid-template-rows: repeat(3, 22px); gap: 2px; }
    .align-btn { width: 22px; height: 22px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; cursor: pointer; transition: all 0.1s; position: relative; }
    .align-btn::after { content: ''; position: absolute; width: 5px; height: 5px; border-radius: 1px; background: var(--ink-faint); top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .align-btn:hover { border-color: var(--border-strong); background: var(--surface-raised); }
    .align-btn.active { background: var(--accent); border-color: var(--accent); }
    .align-btn.active::after { background: var(--bg); }

    /* ─── Buttons ────────────────────────────────────────────── */
    .btn-secondary {
      font-size: var(--font-size-xs); padding: 5px 12px; background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--ink-muted); cursor: pointer; font-family: var(--font); transition: all 0.1s;
    }
    .btn-secondary:hover { border-color: var(--border-strong); color: var(--ink); }
    .btn-icon {
      width: 24px; height: 24px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--ink-muted); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.1s;
    }
    .btn-icon:hover { border-color: var(--border-strong); color: var(--ink); }

    /* ─── Form-props section hidden when nothing selected ─────── */
    #form-props-section { display: none; }
    #form-props-section.visible { display: block; }

    /* ─── New-set input (inline in sets-list) ────────────────── */
    .set-item--new-input { padding: 6px 12px; }
    .set-name-input {
      width: 100%; background: var(--bg); border: 1px solid var(--accent-blue); border-radius: var(--radius-sm);
      color: var(--ink); font-size: var(--font-size-sm); font-family: var(--font); padding: 4px 8px; outline: none;
    }

    .read-only-note { font-size: 10px; color: var(--ink-faint); padding: 0 16px 8px; font-style: italic; }
  </style>
</head>
<body>

  <div class="app">

    <!-- LEFT: Sets sidebar -->
    <aside class="sets-panel">
      <div class="sets-panel__header">
        <span class="sets-panel__title">Sets</span>
        <button class="btn-icon" id="btn-new-set" title="New set">+</button>
      </div>
      <ul class="sets-list" id="sets-list"></ul>
    </aside>

    <!-- MAIN: Toolbar + Grid canvas -->
    <main class="canvas-area">
      <div class="toolbar">
        <div class="toolbar__left">
          <span class="toolbar__set-name" id="toolbar-set-name">Organic Forms</span>
          <span class="toolbar__count" id="toolbar-count">— forms</span>
        </div>
        <div class="toolbar__right">
          <button class="btn-secondary" id="btn-add-form">+ Add Form</button>
          <button class="btn-secondary" id="btn-export-set">Export .js</button>
        </div>
      </div>

      <!-- Hidden SVG defs container — organic-defs.js content injected here -->
      <div id="svg-defs-container" style="position:absolute;width:0;height:0;overflow:hidden;"></div>

      <!-- The grid — CSS custom properties drive layout -->
      <div class="form-grid" id="form-grid"
           style="--grid-cols: 4; --col-gap: 16px; --row-gap: 16px; --grid-padding: 24px;"></div>
    </main>

    <!-- RIGHT: Design panel (Figma-style) -->
    <aside class="design-panel" id="design-panel">

      <!-- GRID PROPERTIES — always visible -->
      <section class="panel-section">
        <div class="panel-section__header"><span class="panel-section__title">Grid</span></div>
        <div class="panel-row">
          <label class="panel-label">Columns</label>
          <div class="panel-input-group"><input type="number" class="panel-input" id="ctrl-columns" value="4" min="1" max="24"></div>
        </div>
        <div class="panel-row">
          <label class="panel-label">Column gap</label>
          <div class="panel-input-group"><input type="number" class="panel-input" id="ctrl-col-gap" value="16" min="0"><span class="panel-unit">px</span></div>
        </div>
        <div class="panel-row">
          <label class="panel-label">Row gap</label>
          <div class="panel-input-group"><input type="number" class="panel-input" id="ctrl-row-gap" value="16" min="0"><span class="panel-unit">px</span></div>
        </div>
        <div class="panel-row">
          <label class="panel-label">Padding</label>
          <div class="panel-input-group"><input type="number" class="panel-input" id="ctrl-padding" value="24" min="0"><span class="panel-unit">px</span></div>
        </div>
      </section>

      <div class="panel-divider"></div>

      <!-- FORM PROPERTIES — visible when a tile is selected -->
      <section class="panel-section" id="form-props-section">
        <div class="panel-section__header"><span class="panel-section__title">Form</span></div>

        <div class="panel-row">
          <label class="panel-label">Name</label>
          <input type="text" class="panel-input panel-input--full" id="ctrl-form-name" placeholder="form name">
        </div>

        <div class="panel-row">
          <label class="panel-label">Type</label>
          <div class="panel-type-pills">
            <button class="type-pill active" data-type="asset">Asset</button>
            <button class="type-pill" data-type="variant">Variant</button>
            <button class="type-pill" data-type="mask">Mask</button>
            <button class="type-pill" data-type="container">Container</button>
          </div>
        </div>

        <div id="read-only-note" class="read-only-note" style="display:none">Built-in form — name &amp; type are read-only</div>

        <div class="panel-divider"></div>

        <div class="panel-section__header"><span class="panel-section__title">Span</span></div>
        <div class="panel-row">
          <label class="panel-label">Columns</label>
          <div class="panel-input-group"><input type="number" class="panel-input" id="ctrl-col-span" value="1" min="1"></div>
        </div>
        <div class="panel-row">
          <label class="panel-label">Rows</label>
          <div class="panel-input-group"><input type="number" class="panel-input" id="ctrl-row-span" value="1" min="1"></div>
        </div>

        <div class="panel-divider"></div>

        <div class="panel-section__header"><span class="panel-section__title">Alignment</span></div>
        <div class="panel-row panel-row--center">
          <div class="align-grid" id="ctrl-align">
            <button class="align-btn" data-align="top-left"></button>
            <button class="align-btn" data-align="top-center"></button>
            <button class="align-btn" data-align="top-right"></button>
            <button class="align-btn" data-align="mid-left"></button>
            <button class="align-btn active" data-align="mid-center"></button>
            <button class="align-btn" data-align="mid-right"></button>
            <button class="align-btn" data-align="bot-left"></button>
            <button class="align-btn" data-align="bot-center"></button>
            <button class="align-btn" data-align="bot-right"></button>
          </div>
        </div>
      </section>
    </aside>

  </div>

  <!-- Load form data (shared, read-only) -->
  <script src="organic-defs.js"></script>
  <script src="organic-forms.js"></script>
  <script>
  // ─────────────────────────────────────────────────────────
  // Genesis Library — Studio Rann
  // NOTE on data shapes (verified against the real shared files):
  //   window.ORGANIC_FORMS  → OBJECT keyed "1".."56" (not an array)
  //   window.ORGANIC_LABELS → OBJECT { "1":"breath", ... }
  //   window.ORGANIC_DEFS   → a full <svg class="defs">…</svg> STRING
  // The data-access layer is adapted accordingly; everything else follows
  // the brief. Built-in forms are read-only and never mutated.
  // ─────────────────────────────────────────────────────────

  const BUILT_IN_SET_ID = 'organic-forms';
  const STORAGE_KEY = 'organica_library';

  let state = {
    activeSetId: BUILT_IN_SET_ID,
    selectedFormIndex: null,
    library: null,
  };

  function defaultLibrary() {
    return {
      sets: [
        {
          id: BUILT_IN_SET_ID,
          name: 'Organic Forms',
          builtIn: true,
          gridConfig: { columns: 4, colGap: 16, rowGap: 16, padding: 24 },
          formLayout: [],
        }
      ],
      forms: [],
    };
  }

  // ── Boot ───────────────────────────────────────────────
  function init() {
    injectDefs();
    loadLibrary();
    renderSetsList();
    bindControls();
    activateSet(state.activeSetId);
  }

  // organic-defs.js exposes window.ORGANIC_DEFS as a complete <svg> string.
  function injectDefs() {
    const c = document.getElementById('svg-defs-container');
    if (c && typeof window.ORGANIC_DEFS === 'string') c.innerHTML = window.ORGANIC_DEFS;
  }

  // ── Library data ───────────────────────────────────────
  function saveLibrary() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.library)); }

  function loadLibrary() {
    let lib = null;
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) lib = JSON.parse(s); } catch (e) { lib = null; }
    state.library = lib || defaultLibrary();
    // Always ensure the built-in set exists and is first
    if (!state.library.sets) state.library.sets = [];
    if (!state.library.forms) state.library.forms = [];
    if (!state.library.sets.find(s => s.id === BUILT_IN_SET_ID)) {
      state.library.sets.unshift(defaultLibrary().sets[0]);
    }
  }

  function getSet(setId) { return state.library.sets.find(s => s.id === setId); }
  function getActiveSetConfig(setId) { return getSet(setId); }

  // Built-in forms come from the shared object; user forms from the library.
  function getFormsForSet(setId) {
    if (setId === BUILT_IN_SET_ID) {
      const F = window.ORGANIC_FORMS || {};
      const L = window.ORGANIC_LABELS || {};
      return Object.keys(F)
        .map(Number)
        .filter(n => F[n])
        .sort((a, b) => a - b)
        .map(n => ({
          id: 'organic-' + n,
          num: n,
          name: L[n] || ('form ' + n),
          svg: F[n],
          type: 'asset',
          builtIn: true,
        }));
    }
    const set = getSet(setId);
    if (!set) return [];
    return (set.forms || [])
      .map(formId => state.library.forms.find(f => f.id === formId))
      .filter(Boolean);
  }

  function getLayoutMap(setId) {
    const set = getSet(setId);
    const map = new Map();
    (set && set.formLayout ? set.formLayout : []).forEach(l =>
      map.set(l.formId, { colSpan: l.colSpan || 1, rowSpan: l.rowSpan || 1, align: l.align || 'mid-center' }));
    return map;
  }

  // ── Sets list ──────────────────────────────────────────
  function renderSetsList() {
    const list = document.getElementById('sets-list');
    list.innerHTML = '';
    state.library.sets.forEach(set => {
      const count = getFormsForSet(set.id).length;
      const li = document.createElement('li');
      li.className = 'set-item' + (set.id === state.activeSetId ? ' active' : '');
      li.dataset.setId = set.id;
      li.innerHTML =
        '<span class="set-item__name">' + escapeHtml(set.name) + '</span>' +
        '<span class="set-item__count">' + count + '</span>';
      li.addEventListener('click', () => activateSet(set.id));
      list.appendChild(li);
    });
  }

  function activateSet(setId) {
    const set = getSet(setId);
    if (!set) return;
    state.activeSetId = setId;
    state.selectedFormIndex = null;

    document.getElementById('toolbar-set-name').textContent = set.name;
    const forms = getFormsForSet(setId);
    document.getElementById('toolbar-count').textContent = forms.length + ' forms';

    // Sync grid panel inputs to this set's config
    document.getElementById('ctrl-columns').value = set.gridConfig.columns;
    document.getElementById('ctrl-col-gap').value = set.gridConfig.colGap;
    document.getElementById('ctrl-row-gap').value = set.gridConfig.rowGap;
    document.getElementById('ctrl-padding').value = set.gridConfig.padding;

    // Export label: built-in can't be exported
    document.getElementById('btn-export-set').disabled = false;

    document.querySelectorAll('.set-item').forEach(li =>
      li.classList.toggle('active', li.dataset.setId === setId));

    deselectForm();
    renderGrid(setId);
  }

  // ── Grid ───────────────────────────────────────────────
  function renderGrid(setId) {
    const grid = document.getElementById('form-grid');
    const set = getActiveSetConfig(setId);
    const forms = getFormsForSet(setId);
    const layout = getLayoutMap(setId);

    grid.style.setProperty('--grid-cols', set.gridConfig.columns);
    grid.style.setProperty('--col-gap', set.gridConfig.colGap + 'px');
    grid.style.setProperty('--row-gap', set.gridConfig.rowGap + 'px');
    grid.style.setProperty('--grid-padding', set.gridConfig.padding + 'px');

    grid.innerHTML = '';

    if (!forms.length) {
      const empty = document.createElement('div');
      empty.className = 'grid-empty';
      empty.textContent = 'No forms yet — use “+ Add Form” to create one.';
      grid.appendChild(empty);
      return;
    }

    forms.forEach((form, i) => {
      const layoutItem = layout.get(form.id) || { colSpan: 1, rowSpan: 1, align: 'mid-center' };
      grid.appendChild(createTile(form, i, layoutItem));
    });
  }

  function createTile(form, index, layoutItem) {
    const tile = document.createElement('div');
    tile.className = 'form-tile' + (index === state.selectedFormIndex ? ' selected' : '');
    tile.dataset.formId = form.id;
    tile.dataset.index = index;
    tile.style.setProperty('--col-span', layoutItem.colSpan);
    tile.style.setProperty('--row-span', layoutItem.rowSpan);

    tile.innerHTML =
      '<div class="form-tile__preview" style="' + alignToCSS(layoutItem.align) + '">' +
        '<div class="form-tile__svg">' + cleanSVG(form.svg) + '</div>' +
      '</div>' +
      '<div class="form-tile__meta">' +
        '<span class="form-tile__name">' + escapeHtml(form.name) + '</span>' +
        '<span class="form-tile__type">' + escapeHtml(form.type) + '</span>' +
      '</div>';

    tile.addEventListener('click', () => selectForm(index));
    return tile;
  }

  // Strip width/height, ensure viewBox, keep all internal geometry intact.
  function cleanSVG(svgString) {
    const div = document.createElement('div');
    div.innerHTML = svgString;
    const svg = div.querySelector('svg');
    if (!svg) return svgString;
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    if (!svg.getAttribute('viewBox')) svg.setAttribute('viewBox', '0 0 200 200');
    svg.style.width = '100%';
    svg.style.height = '100%';
    return div.innerHTML;
  }

  function alignToCSS(align) {
    const map = {
      'top-left':   'align-items:flex-start;justify-content:flex-start',
      'top-center': 'align-items:flex-start;justify-content:center',
      'top-right':  'align-items:flex-start;justify-content:flex-end',
      'mid-left':   'align-items:center;justify-content:flex-start',
      'mid-center': 'align-items:center;justify-content:center',
      'mid-right':  'align-items:center;justify-content:flex-end',
      'bot-left':   'align-items:flex-end;justify-content:flex-start',
      'bot-center': 'align-items:flex-end;justify-content:center',
      'bot-right':  'align-items:flex-end;justify-content:flex-end',
    };
    return map[align] || map['mid-center'];
  }

  // ── Selection ──────────────────────────────────────────
  function selectForm(index) {
    document.querySelectorAll('.form-tile.selected').forEach(t => t.classList.remove('selected'));
    state.selectedFormIndex = index;

    const tile = document.querySelector('.form-tile[data-index="' + index + '"]');
    if (tile) tile.classList.add('selected');

    const forms = getFormsForSet(state.activeSetId);
    const form = forms[index];
    if (!form) return;
    const layoutItem = getLayoutMap(state.activeSetId).get(form.id) || { colSpan: 1, rowSpan: 1, align: 'mid-center' };

    const nameInput = document.getElementById('ctrl-form-name');
    nameInput.value = form.name;
    nameInput.disabled = !!form.builtIn;
    document.getElementById('ctrl-col-span').value = layoutItem.colSpan;
    document.getElementById('ctrl-row-span').value = layoutItem.rowSpan;

    document.querySelectorAll('.type-pill').forEach(pill => {
      pill.classList.toggle('active', pill.dataset.type === form.type);
      pill.disabled = !!form.builtIn;
      pill.style.opacity = form.builtIn ? '0.5' : '1';
    });

    document.querySelectorAll('.align-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.align === layoutItem.align));

    document.getElementById('read-only-note').style.display = form.builtIn ? 'block' : 'none';
    document.getElementById('form-props-section').classList.add('visible');
  }

  function deselectForm() {
    state.selectedFormIndex = null;
    document.querySelectorAll('.form-tile.selected').forEach(t => t.classList.remove('selected'));
    document.getElementById('form-props-section').classList.remove('visible');
  }

  // ── Controls ───────────────────────────────────────────
  function bindControls() {
    const gridInputs = {
      'ctrl-columns': v => updateGridConfig('columns', clampInt(v, 1, 24)),
      'ctrl-col-gap': v => updateGridConfig('colGap', clampInt(v, 0)),
      'ctrl-row-gap': v => updateGridConfig('rowGap', clampInt(v, 0)),
      'ctrl-padding': v => updateGridConfig('padding', clampInt(v, 0)),
    };
    Object.entries(gridInputs).forEach(([id, handler]) => {
      document.getElementById(id).addEventListener('input', e => handler(e.target.value));
    });

    document.getElementById('ctrl-col-span').addEventListener('input', e =>
      updateFormLayout({ colSpan: clampInt(e.target.value, 1) }));
    document.getElementById('ctrl-row-span').addEventListener('input', e =>
      updateFormLayout({ rowSpan: clampInt(e.target.value, 1) }));

    document.querySelectorAll('.align-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateFormLayout({ align: btn.dataset.align });
      });
    });

    document.querySelectorAll('.type-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const form = getFormsForSet(state.activeSetId)[state.selectedFormIndex];
        if (!form || form.builtIn) return;
        document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        updateFormType(form.id, pill.dataset.type);
      });
    });

    document.getElementById('ctrl-form-name').addEventListener('change', e => {
      const form = getFormsForSet(state.activeSetId)[state.selectedFormIndex];
      if (!form || form.builtIn) return;
      updateFormName(form.id, e.target.value);
    });

    document.getElementById('btn-new-set').addEventListener('click', showNewSetInput);
    document.getElementById('btn-add-form').addEventListener('click', () => {
      window.location.href = '/genesis/creator.html';
    });
    document.getElementById('btn-export-set').addEventListener('click', exportActiveSet);

    // Click empty canvas → deselect
    document.getElementById('form-grid').addEventListener('click', e => {
      if (e.target === e.currentTarget) deselectForm();
    });
  }

  function clampInt(v, min, max) {
    let n = parseInt(v, 10);
    if (isNaN(n)) n = min || 0;
    if (min != null) n = Math.max(min, n);
    if (max != null) n = Math.min(max, n);
    return n;
  }

  // ── Mutations ──────────────────────────────────────────
  function updateGridConfig(key, value) {
    const set = getSet(state.activeSetId);
    if (!set) return;
    set.gridConfig[key] = value;

    const grid = document.getElementById('form-grid');
    const propMap = { columns: '--grid-cols', colGap: '--col-gap', rowGap: '--row-gap', padding: '--grid-padding' };
    const suffix = key === 'columns' ? '' : 'px';
    grid.style.setProperty(propMap[key], value + suffix);

    const inputMap = { columns: 'ctrl-columns', colGap: 'ctrl-col-gap', rowGap: 'ctrl-row-gap', padding: 'ctrl-padding' };
    document.getElementById(inputMap[key]).value = value;

    saveLibrary();
  }

  function updateFormLayout(patch) {
    if (state.selectedFormIndex === null) return;
    const form = getFormsForSet(state.activeSetId)[state.selectedFormIndex];
    if (!form) return;
    const set = getSet(state.activeSetId);
    if (!set) return;
    if (!set.formLayout) set.formLayout = [];

    let item = set.formLayout.find(l => l.formId === form.id);
    if (!item) { item = { formId: form.id, colSpan: 1, rowSpan: 1, align: 'mid-center' }; set.formLayout.push(item); }
    Object.assign(item, patch);

    const keepIndex = state.selectedFormIndex;
    renderGrid(state.activeSetId);
    selectForm(keepIndex);
    saveLibrary();
  }

  function updateFormType(formId, type) {
    const f = state.library.forms.find(f => f.id === formId);
    if (!f) return;
    f.type = type;
    saveLibrary();
    const keepIndex = state.selectedFormIndex;
    renderGrid(state.activeSetId);
    selectForm(keepIndex);
  }

  function updateFormName(formId, name) {
    const f = state.library.forms.find(f => f.id === formId);
    if (!f) return;
    f.name = name;
    saveLibrary();
    const keepIndex = state.selectedFormIndex;
    renderGrid(state.activeSetId);
    selectForm(keepIndex);
  }

  // ── New set ────────────────────────────────────────────
  function showNewSetInput() {
    const list = document.getElementById('sets-list');
    const li = document.createElement('li');
    li.className = 'set-item set-item--new-input';
    const input = document.createElement('input');
    input.className = 'set-name-input';
    input.placeholder = 'Set name…';
    input.type = 'text';
    li.appendChild(input);
    list.appendChild(li);
    input.focus();

    let done = false;
    const commit = () => {
      if (done) return; done = true;
      const name = input.value.trim();
      li.remove();
      if (name) createNewSet(name);
    };
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') commit();
      if (e.key === 'Escape') { done = true; li.remove(); }
    });
    input.addEventListener('blur', commit);
  }

  function createNewSet(name) {
    const id = 'set_' + name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '_' + Date.now();
    state.library.sets.push({
      id, name, builtIn: false, forms: [],
      gridConfig: { columns: 4, colGap: 16, rowGap: 16, padding: 24 },
      formLayout: [],
    });
    saveLibrary();
    renderSetsList();
    activateSet(id);
  }

  // ── Export set as .js ──────────────────────────────────
  function exportActiveSet() {
    const setId = state.activeSetId;
    if (setId === BUILT_IN_SET_ID) {
      alert('Organic Forms is a built-in set. No export needed.');
      return;
    }
    const set = getSet(setId);
    const forms = getFormsForSet(setId);
    const setVarName = 'SET_' + set.name.toUpperCase().replace(/[^A-Z0-9]/g, '_');

    let out = '// ' + set.name + ' — Organica Form Set\n';
    out += '// Generated by Genesis Library — ' + new Date().toISOString() + '\n';
    out += '// Studio Rann\n\n';
    out += 'window.' + setVarName + ' = {};\n';
    out += 'window.' + setVarName + '.FORMS = [\n';
    forms.forEach((form, i) => {
      const escaped = String(form.svg).replace(/\\/g, '\\\\').replace(/`/g, '\\`');
      out += '  /* ' + i + ': ' + form.name + ' */\n  `' + escaped + '`,\n';
    });
    out += '];\n\n';
    out += 'window.' + setVarName + '.LABELS = [\n';
    forms.forEach(form => { out += "  '" + String(form.name).replace(/'/g, "\\'") + "',\n"; });
    out += '];\n';

    const blob = new Blob([out], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = set.id + '.js';
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Util ───────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
